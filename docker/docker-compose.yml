version: '3.8'
services:
  postgres:
    image: postgres:15-alpine
    container_name: migme-postgres
    environment:
      POSTGRES_DB: migmedb
      POSTGRES_USER: migmeuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U migmeuser"]
      interval: 10s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    container_name: migme-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: migme-backend
    ports:
      - "8080:8080"
      - "9119:9119"
    environment:
      SPRING_PROFILES_ACTIVE: ${PROFILE:-dev}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: migmedb
      DB_USERNAME: migmeuser
      DB_PASSWORD: ${DB_PASSWORD:-changeme}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-here-change-in-production}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
volumes:
  postgres_data:
  redis_data:
