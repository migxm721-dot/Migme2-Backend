upstream backend_rest {
    server localhost:8080;
}
server {
    listen 80;
    server_name api.migxchat.net;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$server_name$request_uri;
    }
}
server {
    listen 443 ssl http2;
    server_name api.migxchat.net;
    ssl_certificate /etc/letsencrypt/live/api.migxchat.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.migxchat.net/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    client_max_body_size 10M;
    location / {
        proxy_pass http://backend_rest;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /api/health {
        proxy_pass http://backend_rest;
        access_log off;
    }
}
